<!DOCTYPE html>
<html>

<head>
    <title>e-commerce</title>
</head>

<body>
    <!-- Side navigation -->
    <div class="sidenav">
        <a href="#">Clients</a>
        <a href="#">Services</a>
        <a href="#">Contact</a>
        <a href="#">About</a>
    </div>
    <div class="main">
        <h2>Add New Gallery</h2>
        <div class="container" style="border-style: groove">
            <mat-grid-list cols="2">
                <mat-grid-tile>
                    <form [formGroup]="contactForm">
                        <h2>Enter Gallery Info</h2>
                        <div class="form-group">
                            <input matInput formControlName="name" class="form-control"
                                placeholder="Name of the Gallery">
                        </div>

                        <div class="form-group">
                            <input matInput formControlName="description" class="form-control"
                                placeholder="Description">
                        </div>
                        <div class="form-group">
                            <input matInput formControlName="category" class="form-control"
                                placeholder="Category">
                        </div>
                        <div class="form-group">
                            <input matInput formControlName="picture" class="form-control"
                                placeholder="Picture">
                        </div>

                        <div>
                            <button  style="margin-top: 20px; " mat-raised-button routerLink="" type="submit" color="accent" (click)="onSubmit()">
                                Add Gallery<i class="material-icons">add</i>
                            </button>
                        </div>
                    </form>

                </mat-grid-tile>
                <mat-grid-tile>
                    <div class="card">
                        <img src="../../assets/img/Logo.PNG"
                            class="card-img-top" alt="...">
                    </div>
                </mat-grid-tile>
            </mat-grid-list>
        </div>
    </div>
</body>

</html>
